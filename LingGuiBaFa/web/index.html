<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>流注开穴</title>
  <meta name="description" content="按时辰推算灵龟八法、飞腾八法、子午流注纳子法与纳甲法。支持真太阳时修正。">
  <style>
    :root {
      --bg: #efe7d8;
      --paper: rgba(255, 252, 246, 0.95);
      --ink: #23190f;
      --muted: #7a6452;
      --line: #d9ccb6;
      --gold: #8a6224;
      --green: #2f6b5c;
      --blue: #465d87;
      --red: #7c3d43;
      --shadow: 0 18px 40px rgba(56, 35, 12, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(201, 168, 76, 0.2), transparent 32%),
        radial-gradient(circle at bottom right, rgba(122, 61, 67, 0.14), transparent 28%),
        linear-gradient(180deg, #f6f0e5 0%, var(--bg) 100%);
      font-family: "STKaiti", "KaiTi", "Noto Serif SC", serif;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: 24px 14px 72px;
    }

    .hero {
      position: relative;
      text-align: center;
      padding: 16px 0 8px;
    }

    .hero-mark {
      position: absolute;
      inset: -6px 0 auto;
      font-size: 82px;
      color: rgba(201, 168, 76, 0.11);
      letter-spacing: 8px;
      pointer-events: none;
      user-select: none;
    }

    .hero h1 {
      position: relative;
      margin: 0;
      font-size: 30px;
      letter-spacing: 6px;
      font-weight: 700;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 2px;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .panel {
      padding: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .field label,
    .inline-label {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .input,
    .number-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f7f1e6;
      padding: 12px 14px;
      font-size: 16px;
      color: var(--ink);
      outline: none;
    }

    .input:focus,
    .number-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(138, 98, 36, 0.12);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .toggle-row input {
      width: 16px;
      height: 16px;
      accent-color: var(--gold);
    }

    .solar-box {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(247, 241, 230, 0.88);
    }

    .solar-box.active {
      display: grid;
      gap: 10px;
    }

    .longitude-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .number-input {
      width: 110px;
      text-align: center;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 10px;
      margin-top: 12px;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 12px;
      height: 48px;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .btn:disabled {
      cursor: wait;
      opacity: 0.6;
    }

    .btn-primary {
      border: 0;
      background: linear-gradient(135deg, #7f5a23, #9c7330);
      color: #fffdf6;
      box-shadow: 0 10px 24px rgba(124, 92, 46, 0.28);
      letter-spacing: 3px;
    }

    .banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 0 4px;
      flex-wrap: wrap;
    }

    .banner.active,
    .results.active {
      display: flex;
    }

    .pill {
      text-align: center;
      min-width: 88px;
    }

    .pill small {
      display: block;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 2px;
      margin-bottom: 3px;
    }

    .pill strong {
      font-size: 22px;
      letter-spacing: 4px;
      font-weight: 700;
    }

    .sep {
      color: #bea98f;
      font-size: 18px;
      padding-bottom: 4px;
    }

    .solar-result {
      display: none;
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #ebf5f1;
      border: 1px solid #bbd8ce;
    }

    .solar-result.active {
      display: block;
    }

    .solar-result h2 {
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--green);
      letter-spacing: 2px;
    }

    .solar-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.8;
    }

    .solar-time {
      margin-top: 8px;
      font-size: 24px;
      color: var(--green);
      letter-spacing: 4px;
      font-weight: 700;
    }

    .results {
      display: none;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .method {
      padding: 14px;
      border-left: 4px solid currentColor;
      animation: rise .28s ease;
    }

    .method-head {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .method-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      letter-spacing: 1px;
      background: rgba(0, 0, 0, 0.06);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: stretch;
    }

    .plus {
      align-self: center;
      color: #b8a38a;
      font-size: 18px;
      font-weight: 300;
    }

    .chip {
      flex: 1 1 96px;
      min-width: 96px;
      padding: 10px 8px;
      border-radius: 12px;
      background: #f6f0e4;
      text-align: center;
    }

    .chip-label {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .chip-name {
      font-size: 20px;
      letter-spacing: 2px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .chip-meta {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .foot {
      text-align: center;
      color: #bca68d;
      font-size: 10px;
      letter-spacing: 3px;
      margin-top: 8px;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 560px) {
      .hero h1 {
        font-size: 28px;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div class="hero-mark">龜</div>
      <h1>流注开穴</h1>
      <p>子午流注 · 灵龟八法 · 飞腾八法</p>
    </header>

    <section class="card panel">
      <div class="field">
        <label for="dt">日期时间</label>
        <input id="dt" class="input" type="datetime-local">
      </div>

      <div class="toggle-row">
        <input id="use-solar" type="checkbox">
        <label class="inline-label" for="use-solar">启用真太阳时修正</label>
      </div>

      <div id="solar-box" class="solar-box">
        <div class="longitude-row">
          <span class="inline-label">当地经度</span>
          <input id="longitude" class="number-input" type="number" min="70" max="135" step="0.1" value="116.4">
          <span class="inline-label">° E</span>
          <button id="locate" class="btn" type="button">自动定位</button>
        </div>
        <div id="location-hint" class="hint">默认使用北京东经 116.4°。</div>
      </div>

      <div class="actions">
        <button id="now" class="btn" type="button">当前时间</button>
        <button id="calc" class="btn btn-primary" type="button">推算开穴</button>
      </div>
    </section>

    <section id="solar-result" class="solar-result">
      <h2>真太阳时修正</h2>
      <div id="solar-meta" class="solar-meta"></div>
      <div id="solar-time" class="solar-time"></div>
    </section>

    <section id="banner" class="banner">
      <div class="pill">
        <small>日干支</small>
        <strong id="day-sb"></strong>
      </div>
      <div class="sep">·</div>
      <div class="pill">
        <small>时干支</small>
        <strong id="hour-sb"></strong>
      </div>
      <div class="sep">·</div>
      <div class="pill">
        <small>时辰</small>
        <strong id="branch-label"></strong>
      </div>
    </section>

    <section id="results" class="results">
      <article class="card method" style="color: var(--gold);">
        <div class="method-head">
          <span class="method-title">灵龟八法</span>
          <span class="badge">奇经纳卦</span>
        </div>
        <div id="linggui" class="chips"></div>
      </article>

      <article class="card method" style="color: var(--green);">
        <div class="method-head">
          <span class="method-title">飞腾八法</span>
        </div>
        <div id="feiteng" class="chips"></div>
      </article>

      <article class="card method" style="color: var(--blue);">
        <div class="method-head">
          <span class="method-title">子午流注纳子法</span>
          <span id="nazi-badge" class="badge"></span>
        </div>
        <div id="nazi" class="chips"></div>
      </article>

      <article class="card method" style="color: var(--red);">
        <div class="method-head">
          <span class="method-title">子午流注纳甲法</span>
          <span id="najia-badge" class="badge"></span>
        </div>
        <div id="najia" class="chips"></div>
      </article>
    </section>

    <div class="foot">按时取穴 · 因时制宜</div>
  </main>

        丁卯: [
          { name: "神门", code: "HT7", type: "输", m: "心经" },
          { name: "太溪", code: "KI3", type: "原", m: "肾经" },
          { name: "大陵", code: "PC7", type: "原", m: "心包经" }
        ],
        己巳: [{ name: "商丘", code: "SP5", type: "经", m: "脾经" }],
        辛未: [{ name: "尺泽", code: "LU5", type: "合", m: "肺经" }],
        癸酉: [{ name: "中冲", code: "PC9", type: "井", m: "心包经" }]
      }
    };

    const dtInput = document.getElementById("dt");
    const useSolarInput = document.getElementById("use-solar");
    const solarBox = document.getElementById("solar-box");
    const longitudeInput = document.getElementById("longitude");
    const locateButton = document.getElementById("locate");
    const locationHint = document.getElementById("location-hint");
    const nowButton = document.getElementById("now");
    const calcButton = document.getElementById("calc");

    const solarResult = document.getElementById("solar-result");
    const solarMeta = document.getElementById("solar-meta");
    const solarTime = document.getElementById("solar-time");
    const banner = document.getElementById("banner");
    const results = document.getElementById("results");

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function toLocalDT(date) {
      return [
        date.getFullYear(),
        pad(date.getMonth() + 1),
        pad(date.getDate())
      ].join("-") + "T" + [pad(date.getHours()), pad(date.getMinutes())].join(":");
    }

    function equationOfTime(dateStr) {
      const date = new Date(dateStr + "T00:00:00");
      const start = new Date(date.getFullYear(), 0, 0);
      const diff = date - start;
      const dayOfYear = Math.floor(diff / 86400000);
      const b = (360 / 365) * (dayOfYear - 81) * (Math.PI / 180);
      return 9.87 * Math.sin(2 * b) - 7.53 * Math.cos(b) - 1.5 * Math.sin(b);
    }

    function calcSolarTime(dtStr, longitude) {
      const [dateStr, timeStr] = dtStr.split("T");
      const [hour, minute] = timeStr.split(":").map(Number);
      const totalMinutes = hour * 60 + minute;
      const lonCorrection = (longitude - 120) * 4;
      const eot = equationOfTime(dateStr);
      const corrected = totalMinutes + lonCorrection + eot;
      const totalMod = ((corrected % 1440) + 1440) % 1440;
      const solarHour = Math.floor(totalMod / 60);
      const solarMinute = Math.round(totalMod % 60);
      const base = new Date(dateStr + "T" + timeStr);
      const solarDate = new Date(base.getTime() + (lonCorrection + eot) * 60000);
      return {
        solarHour,
        solarMinute,
        solarDateStr: `${solarDate.getFullYear()}-${pad(solarDate.getMonth() + 1)}-${pad(solarDate.getDate())}`,
        lonCorrection: Math.round(lonCorrection * 10) / 10,
        eot: Math.round(eot * 10) / 10,
        totalDiff: Math.round((lonCorrection + eot) * 10) / 10
      };
    }

    function getDaySB(dateStr) {
      const base = new Date("2024-01-01T00:00:00");
      const date = new Date(dateStr + "T00:00:00");
      const diff = Math.round((date - base) / 86400000);
      return STEMS[((diff % 10) + 10) % 10] + BRANCHES[((diff % 12) + 12) % 12];
    }

    function getHourSB(dayStem, hour) {
      const branchIndex = hour === 23 ? 0 : Math.floor((hour + 1) / 2) % 12;
      return STEMS[(HOUR_BASE[dayStem] + branchIndex) % 10] + BRANCHES[branchIndex];
    }

    function getBranchLabel(hour) {
      const branchIndex = hour === 23 ? 0 : Math.floor((hour + 1) / 2) % 12;
      return BRANCHES[branchIndex] + "时";
    }

    function calcLingGui(daySB, hourSB) {
      const total = LG_DS[daySB[0]] + LG_DB[daySB[1]] + LG_HS[hourSB[0]] + LG_HB[hourSB[1]];
      const isYang = STEMS.indexOf(daySB[0]) % 2 === 0;
      const divisor = isYang ? 9 : 6;
      let rem = total % divisor;
      if (rem === 0) rem = divisor;
      const main = LG_MAP[rem];
      return { main, pair: PAIR[main] || "" };
    }

    function calcFeiTeng(hourSB) {
      const main = FT_MAP[hourSB[0]];
      return { main, pair: PAIR[main] || "" };
    }

    function calcNaZi(hourSB) {
      const row = NAZI_TABLE[hourSB[1]];
      return {
        meridian: row[0],
        ben: row[1],
        benCode: row[2],
        yuan: row[3],
        yuanCode: row[4],
        samePoint: row[1] === row[3]
      };
    }

    function calcNaJia(daySB, hourSB) {
      const dayTable = NAJIA_TABLE[daySB[0]];
      if (!dayTable) return { points: null };
      return { points: dayTable[hourSB] || null };
    }

    function chip(label, name, meta) {
      return `<div class="chip"><div class="chip-label">${label}</div><div class="chip-name">${name}</div><div class="chip-meta">${meta}</div></div>`;
    }

    function renderPair(target, pairResult) {
      const mainMeta = POINT_META[pairResult.main];
      const pairMeta = POINT_META[pairResult.pair];
      const main = chip("开穴", pairResult.main, `${mainMeta.m} · 通${mainMeta.e}`);
      const pair = pairResult.pair ? `<div class="plus">+</div>${chip("配穴", pairResult.pair, `${pairMeta.m} · 通${pairMeta.e}`)}` : "";
      target.innerHTML = main + pair;
    }

    function renderNaZi(target, data) {
      const first = chip("本穴", data.ben, `${data.meridian} · ${data.benCode}`);
      const second = data.samePoint ? "" : `<div class="plus">+</div>${chip("原穴", data.yuan, `${data.meridian} · ${data.yuanCode}`)}`;
      target.innerHTML = first + second;
    }

    function renderNaJia(target, data) {
      if (!data.points) {
        target.innerHTML = '<div class="empty">此时辰闭穴（无）</div>';
        return;
      }
      target.innerHTML = data.points.map((point) => chip(point.type, point.name, `${point.m} · ${point.code}`)).join("");
    }

    function setNow() {
      dtInput.value = toLocalDT(new Date());
    }

    function updateSolarVisibility() {
      solarBox.classList.toggle("active", useSolarInput.checked);
    }

    function calculate() {
      if (!dtInput.value) setNow();
      let calcDt = dtInput.value;
      let solarInfo = null;
      if (useSolarInput.checked) {
        solarInfo = calcSolarTime(dtInput.value, Number(longitudeInput.value) || 116.4);
        calcDt = `${solarInfo.solarDateStr}T${pad(solarInfo.solarHour)}:${pad(solarInfo.solarMinute)}`;
      }

      const [dateStr, timeStr] = calcDt.split("T");
      const hour = Number(timeStr.split(":")[0]);
      const daySB = getDaySB(dateStr);
      const hourSB = getHourSB(daySB[0], hour);
      const branchLabel = getBranchLabel(hour);
      const lingGui = calcLingGui(daySB, hourSB);
      const feiTeng = calcFeiTeng(hourSB);
      const naZi = calcNaZi(hourSB);
      const naJia = calcNaJia(daySB, hourSB);

      document.getElementById("day-sb").textContent = daySB;
      document.getElementById("hour-sb").textContent = hourSB;
      document.getElementById("branch-label").textContent = branchLabel;
      document.getElementById("nazi-badge").textContent = `${naZi.meridian}当令`;
      document.getElementById("najia-badge").textContent = naJia.points ? naJia.points[0].m : "";

      renderPair(document.getElementById("linggui"), lingGui);
      renderPair(document.getElementById("feiteng"), feiTeng);
      renderNaZi(document.getElementById("nazi"), naZi);
      renderNaJia(document.getElementById("najia"), naJia);

      banner.classList.add("active");
      results.classList.add("active");

      if (solarInfo) {
        solarMeta.innerHTML = [
          `经度修正 ${solarInfo.lonCorrection > 0 ? "+" : ""}${solarInfo.lonCorrection} 分`,
          `均时差 ${solarInfo.eot > 0 ? "+" : ""}${solarInfo.eot} 分`,
          `合计 ${solarInfo.totalDiff > 0 ? "+" : ""}${solarInfo.totalDiff} 分`
        ].map((item) => `<span>${item}</span>`).join('<span>·</span>');
        solarTime.textContent = `真太阳时：${pad(solarInfo.solarHour)}:${pad(solarInfo.solarMinute)}`;
        solarResult.classList.add("active");
      } else {
        solarResult.classList.remove("active");
      }
    }

    async function locate() {
      if (!navigator.geolocation) {
        locationHint.textContent = "当前浏览器不支持地理定位，请手动输入经度。";
        return;
      }
      locateButton.disabled = true;
      locateButton.textContent = "定位中";
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lon = Math.round(pos.coords.longitude * 100) / 100;
          longitudeInput.value = String(lon);
          locationHint.textContent = `已定位到东经 ${lon}°。`;
          locateButton.disabled = false;
          locateButton.textContent = "自动定位";
        },
        () => {
          locationHint.textContent = "定位失败，请检查浏览器权限或手动输入经度。";
          locateButton.disabled = false;
          locateButton.textContent = "自动定位";
        },
        { enableHighAccuracy: false, timeout: 10000 }
      );
    }

    useSolarInput.addEventListener("change", updateSolarVisibility);
    nowButton.addEventListener("click", () => {
      setNow();
      calculate();
    });
    calcButton.addEventListener("click", calculate);
    locateButton.addEventListener("click", locate);

    setNow();
    updateSolarVisibility();
    calculate();
  </script>
</body>
</html>
